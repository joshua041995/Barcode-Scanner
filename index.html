<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barcode Scanner PWA</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<style>
  body { margin:0; font-family:Arial, sans-serif; background:#f5f7fb; }
  #scanner { width:100%; height:60vh; background:#000; position:relative; }
  button { font-size:1rem; margin:5px; padding:10px 15px; border:none; border-radius:5px; cursor:pointer; }
  #manualAddBtn { position:absolute; bottom:15px; right:15px; z-index:1000; font-size:1.8rem; padding:12px; border-radius:50%; background:#4CAF50; color:#fff; box-shadow:0 4px 8px rgba(0,0,0,0.3); }
  .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
  .modal-content { background:#fff; padding:20px; border-radius:10px; width:90%; max-width:400px; }
  .modal-content input { width:100%; padding:8px; margin:5px 0; font-size:1rem; }
  #productsListModal .modal-content { max-height:80vh; overflow-y:auto; }
  .product-row { display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #ccc; padding:5px 0; font-size:1.1rem; }
  .product-row button { font-size:0.9rem; padding:5px; margin-left:5px; }
  #scanBarcodeBtn { position:absolute; right:5px; top:5px; height:30px; width:30px; border:none; background:#4CAF50; color:white; border-radius:50%; font-size:18px; }
  #clearFieldsBtn { background:#f44336; color:#fff; margin-top:10px; }
</style>
</head>
<body>

<div id="scanner"></div>
<button id="manualAddBtn">➕</button>

<div style="padding:10px; display:flex; justify-content:center; flex-wrap:wrap;">
  <button onclick="openProductsModal()">Products</button>
  <button onclick="startScan('search')">Search</button>
  <button onclick="refreshPage()">Refresh</button>
</div>

<!-- Manual Add Modal -->
<div id="manualAddModal" class="modal">
  <div class="modal-content">
    <h3>Add Product Manually</h3>
    <div style="position:relative;">
      <input id="manualBarcodeInput" placeholder="Barcode (optional)" style="padding-right:40px;">
      <button id="scanBarcodeBtn">📷</button>
    </div>
    <input id="manualNameInput" placeholder="Product Name">
    <input id="manualPriceInput" type="number" placeholder="Price">
    <input id="manualWholesaleInput" type="number" placeholder="Wholesale Price">
    <div style="display:flex; justify-content:space-between; flex-wrap:wrap;">
      <button onclick="saveManualProduct()">Save</button>
      <button id="clearFieldsBtn" onclick="clearManualFields()">Clear</button>
      <button onclick="closeManualModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Products List Modal -->
<div id="productsListModal" class="modal">
  <div class="modal-content">
    <h3>Saved Products</h3>
    <div id="productsContainer"></div>
    <button onclick="closeProductsModal()">Close</button>
  </div>
</div>

<!-- Audio -->
<audio id="beepAudio" src="beep.mp3.wav" preload="auto"></audio>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
let products = JSON.parse(localStorage.getItem('products') || '[]');
let html5Scanner;  // Single scanner instance
let scanMode = ''; // 'search' or 'manual'

function refreshPage(){ location.reload(); }

// Manual Add
const manualBtn = document.getElementById('manualAddBtn');
manualBtn.addEventListener('click', ()=>{ document.getElementById('manualAddModal').style.display='flex'; });
function closeManualModal(){ document.getElementById('manualAddModal').style.display='none'; }

function clearManualFields(){
  document.getElementById('manualBarcodeInput').value = '';
  document.getElementById('manualNameInput').value = '';
  document.getElementById('manualPriceInput').value = '';
  document.getElementById('manualWholesaleInput').value = '';
}

function saveManualProduct(){
  const barcode = document.getElementById('manualBarcodeInput').value;
  const name = document.getElementById('manualNameInput').value;
  const price = document.getElementById('manualPriceInput').value;
  const wholesale = document.getElementById('manualWholesaleInput').value;
  if(!name){ alert("Product Name is required"); return; }
  if(barcode && products.find(p=>p.barcode===barcode)){ alert("Product already exists"); return; }
  products.push({barcode,name,price,wholesale});
  localStorage.setItem('products', JSON.stringify(products));
  document.getElementById('beepAudio').play();
  closeManualModal(); alert("Product added!");
}

// Products List Modal
function openProductsModal(){
  const container = document.getElementById('productsContainer');
  container.innerHTML = '';
  products.forEach((p,i)=>{
    const div = document.createElement('div');
    div.className = 'product-row';
    div.innerHTML = `<span>${p.barcode || '-'} | ${p.name} | ₱${p.price} | ₱${p.wholesale}</span>
      <span>
      <button onclick="editProduct(${i})">Edit</button>
      <button onclick="deleteProduct(${i})">Delete</button>
      </span>`;
    container.appendChild(div);
  });
  document.getElementById('productsListModal').style.display='flex';
}
function closeProductsModal(){ document.getElementById('productsListModal').style.display='none'; }
function deleteProduct(i){ if(confirm("Delete this product?")){ products.splice(i,1); localStorage.setItem('products',JSON.stringify(products)); openProductsModal(); } }
function editProduct(i){
  const p = products[i];
  document.getElementById('manualBarcodeInput').value = p.barcode || '';
  document.getElementById('manualNameInput').value = p.name;
  document.getElementById('manualPriceInput').value = p.price;
  document.getElementById('manualWholesaleInput').value = p.wholesale;
  document.getElementById('manualAddModal').style.display='flex';
  closeProductsModal();
  products.splice(i,1);
}

// Initialize scanner once
function initScanner(){
  if(!html5Scanner){
    html5Scanner = new Html5Qrcode("scanner");
  }
}

// Start scan
function startScan(mode){
  scanMode = mode; // remember mode
  initScanner();
  Html5Qrcode.getCameras().then(cameras=>{
    if(cameras && cameras.length){ 
      html5Scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        qrCodeMessage => {
          document.getElementById('beepAudio').play();
          if(scanMode==='search'){
            const existing = products.find(p=>p.barcode===qrCodeMessage);
            if(existing){ alert(`Found: ${existing.name} ₱${existing.price}`); }
            else{ alert(`Barcode: ${qrCodeMessage} not in list`); }
          } else if(scanMode==='manual'){
            document.getElementById('manualBarcodeInput').value = qrCodeMessage;
            closeModalTemp();
          }
          html5Scanner.stop().then(()=>{}).catch(err=>console.log(err));
        },
        err => console.log(err)
      );
    }
  }).catch(err=>alert("Camera error: "+err));
}

// Modal scanner: hide modal
function closeModalTemp(){ document.getElementById('manualAddModal').style.display='flex'; }

// PWA
if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js'); }

// Barcode icon in modal
document.getElementById('scanBarcodeBtn').addEventListener('click', () => {
  document.getElementById('manualAddModal').style.display='none';
  startScan('manual');
});
</script>
</body>
</html>
