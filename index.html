<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Scanner</title>
<style>
body { margin:0; font-family:Arial; background:#f5f7fb; }
#scanner { width:100%; height:55vh; background:#000; }
button { padding:10px; margin:5px; border:none; border-radius:6px; font-size:1rem; cursor:pointer; }
#manualAddBtn { position:absolute; bottom:15px; right:15px; font-size:22px; background:#4CAF50; color:white; border-radius:50%; width:55px; height:55px; }
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
.modal-content { background:#fff; padding:20px; border-radius:10px; width:90%; max-width:400px; position:relative; }
input { width:100%; padding:8px; margin:5px 0; }
.product-row { border-bottom:1px solid #ccc; padding:5px; font-size:1rem; display:flex; justify-content:space-between; align-items:center; }
#scanBarcodeBtn { position:absolute; right:5px; top:5px; }
.close-btn { position:absolute; top:10px; right:10px; background:#ccc; border-radius:50%; width:25px; height:25px; font-weight:bold; line-height:25px; text-align:center; cursor:pointer; }
</style>
</head>
<body>

<div id="scanner"></div>

<button id="manualAddBtn">➕</button>

<div style="text-align:center;">
  <button onclick="startScan('search')">Search</button>
  <button onclick="startScan('pos')">POS</button>
  <button onclick="openProducts()">Products</button>
  <button onclick="openCart()">Cart</button>
  <button onclick="location.reload()">Refresh</button>
</div>

<!-- Manual Add Product Modal -->
<div id="manualAddModal" class="modal">
<div class="modal-content">
<span class="close-btn" onclick="closeModal()">×</span>
<h3>Add Product</h3>
<div style="position:relative;">
<input id="manualBarcodeInput" placeholder="Barcode">
<button id="scanBarcodeBtn">📷</button>
</div>
<input id="manualNameInput" placeholder="Name">
<input id="manualPriceInput" placeholder="Price" type="number">
<button onclick="saveProduct()">Save</button>
<button onclick="clearFields()">Clear</button>
</div>
</div>

<!-- Products List Modal -->
<div id="productsModal" class="modal">
<div class="modal-content">
<span class="close-btn" onclick="closeProducts()">×</span>
<h3>Products</h3>
<div id="productList"></div>
</div>
</div>

<!-- POS Cart Modal -->
<div id="posCartModal" class="modal">
<div class="modal-content">
<span class="close-btn" onclick="closeCart()">×</span>
<h3>POS Cart</h3>
<div id="cartItems"></div>
<h3>Total: ₱<span id="cartTotal">0</span></h3>
<button onclick="clearCart()">Clear</button>
<button onclick="closeCart()">Close</button>
<button onclick="printReceipt()">Print Receipt</button>
</div>
</div>

<audio id="beepAudio" src="beep.mp3.wav"></audio>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
let products = JSON.parse(localStorage.getItem('products')||'[]');
let receipts = JSON.parse(localStorage.getItem('receipts')||'[]');
let cart = [];
let scanner;
let mode="";

// Initialize scanner
function initScanner(){
  if(!scanner){
    scanner = new Html5Qrcode("scanner");
  }
}

// Start scanner
function startScan(m){
  mode = m;
  initScanner();
  Html5Qrcode.getCameras().then(()=>{
    scanner.start(
      {facingMode:"environment"},
      {fps:10, qrbox:250},
      code=>{
        beep();
        if(mode==="search"){
          let p = products.find(x=>x.barcode===code);
          alert(p ? `${p.name} ₱${p.price}` : "Product not found");
        }
        if(mode==="manual"){
          document.getElementById("manualBarcodeInput").value = code;
          document.getElementById("manualAddModal").style.display="flex";
        }
        if(mode==="pos"){
          handlePOSScan(code);
        }
        if(mode!=="pos"){ scanner.stop(); }
      }
    );
  });
}

// Beep sound
function beep(){ document.getElementById("beepAudio").play(); }

// Manual Add
document.getElementById("manualAddBtn").onclick=()=>{ document.getElementById("manualAddModal").style.display="flex"; }
function closeModal(){ document.getElementById("manualAddModal").style.display="none"; }
function clearFields(){ manualBarcodeInput.value=""; manualNameInput.value=""; manualPriceInput.value=""; }
function saveProduct(){
  if(!manualNameInput.value){ alert("Name required"); return; }
  if(manualBarcodeInput.value && products.find(p=>p.barcode===manualBarcodeInput.value)){ alert("Product exists"); return; }
  products.push({barcode:manualBarcodeInput.value,name:manualNameInput.value,price:parseFloat(manualPriceInput.value)||0});
  localStorage.setItem("products",JSON.stringify(products));
  beep();
  closeModal();
}

// Camera in input
scanBarcodeBtn.onclick=()=>{
  document.getElementById("manualAddModal").style.display="none";
  startScan("manual");
};

// Products List with edit
function openProducts(){
  let list=document.getElementById("productList");
  list.innerHTML="";
  products.forEach(p=>{
    let div=document.createElement("div");
    div.className="product-row";
    div.innerHTML = `
      ${p.name} ₱${p.price} 
      <div>
        <button onclick="editProduct('${p.barcode}')">Edit</button>
        <button onclick="deleteProduct('${p.barcode}')">Delete</button>
      </div>
    `;
    list.appendChild(div);
  });
  document.getElementById("productsModal").style.display="flex";
}
function closeProducts(){ document.getElementById("productsModal").style.display="none"; }
function deleteProduct(code){
  if(confirm("Delete this product?")){
    products = products.filter(p=>p.barcode!==code);
    localStorage.setItem("products",JSON.stringify(products));
    openProducts();
  }
}
function editProduct(code){
  let p = products.find(p=>p.barcode===code);
  if(p){
    manualBarcodeInput.value = p.barcode;
    manualNameInput.value = p.name;
    manualPriceInput.value = p.price;
    document.getElementById("manualAddModal").style.display="flex";
  }
}

// POS Bulk Scan
function handlePOSScan(code){
  let product = products.find(p=>p.barcode===code);
  if(!product){ alert("Product not found"); return; }
  let existing = cart.find(i=>i.barcode===code);
  if(existing){ existing.qty +=1; existing.total = existing.qty * existing.price; }
  else { cart.push({barcode:product.barcode,name:product.name,price:product.price,qty:1,total:product.price}); }
  beep();
  updateCartUI();
}

// Cart UI
function updateCartUI(){
  let container = document.getElementById("cartItems");
  container.innerHTML="";
  let total = 0;
  cart.forEach(item=>{
    total += item.total;
    let div = document.createElement("div");
    div.className = "product-row";
    div.innerText = `${item.name} x${item.qty} ₱${item.total.toFixed(2)}`;
    container.appendChild(div);
  });
  document.getElementById("cartTotal").innerText = total.toFixed(2);
}
function openCart(){ document.getElementById("posCartModal").style.display="flex"; }
function closeCart(){ document.getElementById("posCartModal").style.display="none"; }
function clearCart(){ cart=[]; updateCartUI(); }

// Print Receipt
function printReceipt(){
  if(cart.length===0){ alert("Cart is empty"); return; }
  let total = 0;
  let itemsHTML = "";
  cart.forEach(item=>{
    total += item.total;
    itemsHTML += `<tr><td>${item.name}</td><td>${item.qty}</td><td>₱${item.total.toFixed(2)}</td></tr>`;
  });
  let receiptWindow = window.open('', '', 'width=400,height=600');
  receiptWindow.document.write(`
    <html>
    <head>
      <title>Receipt</title>
      <style>
        body { font-family: monospace; padding:10px; }
        h2 { text-align:center; }
        table { width:100%; border-collapse:collapse; }
        td { padding:5px; border-bottom:1px dashed #000; }
        .total { font-weight:bold; }
      </style>
    </head>
    <body>
      <h2>STORE RECEIPT</h2>
      <p>${new Date().toLocaleString()}</p>
      <table>
        <tr><td><b>Item</b></td><td><b>Qty</b></td><td><b>Total</b></td></tr>
        ${itemsHTML}
        <tr class="total"><td colspan="2">TOTAL</td><td>₱${total.toFixed(2)}</td></tr>
      </table>
    </body>
    </html>
  `);
  receiptWindow.document.close();
  setTimeout(()=>{ receiptWindow.print(); }, 300);
}
</script>

</body>
</html>
