<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Scanner</title>

<style>
body { margin:0; font-family:Arial; background:#f5f7fb; }

#scanner { width:100%; height:55vh; background:#000; }

button {
  padding:10px; margin:5px; border:none;
  border-radius:6px; font-size:1rem;
}

#manualAddBtn {
  position:absolute; bottom:15px; right:15px;
  font-size:22px; background:#4CAF50; color:white;
  border-radius:50%; width:55px; height:55px;
}

.modal {
  display:none; position:fixed; top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center; align-items:center;
}

.modal-content {
  background:#fff; padding:20px;
  border-radius:10px; width:90%;
}

input {
  width:100%; padding:8px; margin:5px 0;
}

.product-row {
  border-bottom:1px solid #ccc;
  padding:5px; font-size:1rem;
}

#scanBarcodeBtn {
  position:absolute; right:5px; top:5px;
}
</style>
</head>

<body>

<div id="scanner"></div>

<button id="manualAddBtn">➕</button>

<div style="text-align:center;">
  <button onclick="startScan('search')">Search</button>
  <button onclick="startScan('pos')">POS</button>
  <button onclick="openProducts()">Products</button>
  <button onclick="location.reload()">Refresh</button>
</div>

<!-- ADD PRODUCT -->
<div id="manualAddModal" class="modal">
<div class="modal-content">
<h3>Add Product</h3>

<div style="position:relative;">
<input id="manualBarcodeInput" placeholder="Barcode">
<button id="scanBarcodeBtn">📷</button>
</div>

<input id="manualNameInput" placeholder="Name">
<input id="manualPriceInput" placeholder="Price" type="number">

<button onclick="saveProduct()">Save</button>
<button onclick="clearFields()">Clear</button>
<button onclick="closeModal()">Cancel</button>
</div>
</div>

<!-- PRODUCTS -->
<div id="productsModal" class="modal">
<div class="modal-content">
<h3>Products</h3>
<div id="productList"></div>
<button onclick="closeProducts()">Close</button>
</div>
</div>

<!-- POS -->
<div id="posModal" class="modal">
<div class="modal-content">

<h3>POS</h3>

<p>Barcode: <span id="posBarcode"></span></p>
<p>Name: <span id="posName"></span></p>
<p>Price: ₱<span id="posPrice"></span></p>

<div>
<button onclick="changeQty(-1)">-</button>
<input id="posQty" value="1" style="width:50px;text-align:center;">
<button onclick="changeQty(1)">+</button>
</div>

<p>Total: ₱<span id="posTotal"></span></p>

<button onclick="addToReceipt()">Add</button>
<button onclick="closePOS()">Cancel</button>

</div>
</div>

<audio id="beepAudio" src="beep.mp3.wav"></audio>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
let products = JSON.parse(localStorage.getItem('products')||'[]');
let receipts = JSON.parse(localStorage.getItem('receipts')||'[]');

let scanner;
let mode="";
let currentProduct=null;

// INIT SCANNER
function initScanner(){
  if(!scanner){
    scanner = new Html5Qrcode("scanner");
  }
}

// START SCAN
function startScan(m){
  mode = m;
  initScanner();

  Html5Qrcode.getCameras().then(()=>{
    scanner.start(
      {facingMode:"environment"},
      {fps:10, qrbox:250},
      code=>{
        beep();

        if(mode==="search"){
          let p = products.find(x=>x.barcode===code);
          alert(p ? p.name+" ₱"+p.price : "Not found");
        }

        if(mode==="manual"){
          document.getElementById("manualBarcodeInput").value = code;
          document.getElementById("manualAddModal").style.display="flex";
        }

        if(mode==="pos"){
          let p = products.find(x=>x.barcode===code);
          if(p) openPOS(p);
          else alert("Not found");
        }

        scanner.stop();
      }
    );
  });
}

// BEEP
function beep(){
  document.getElementById("beepAudio").play();
}

// ADD PRODUCT
document.getElementById("manualAddBtn").onclick=()=>{
  document.getElementById("manualAddModal").style.display="flex";
};

function closeModal(){
  document.getElementById("manualAddModal").style.display="none";
}

function clearFields(){
  manualBarcodeInput.value="";
  manualNameInput.value="";
  manualPriceInput.value="";
}

function saveProduct(){
  let p={
    barcode:manualBarcodeInput.value,
    name:manualNameInput.value,
    price:parseFloat(manualPriceInput.value)
  };
  products.push(p);
  localStorage.setItem("products",JSON.stringify(products));
  beep();
  closeModal();
}

// CAMERA IN INPUT
scanBarcodeBtn.onclick=()=>{
  document.getElementById("manualAddModal").style.display="none";
  startScan("manual");
};

// PRODUCTS LIST
function openProducts(){
  let list=document.getElementById("productList");
  list.innerHTML="";
  products.forEach(p=>{
    let div=document.createElement("div");
    div.className="product-row";
    div.innerText=p.name+" ₱"+p.price;
    list.appendChild(div);
  });
  document.getElementById("productsModal").style.display="flex";
}

function closeProducts(){
  document.getElementById("productsModal").style.display="none";
}

// POS
function openPOS(p){
  currentProduct=p;

  posBarcode.innerText=p.barcode;
  posName.innerText=p.name;
  posPrice.innerText=p.price;

  posQty.value=1;
  updateTotal();

  posModal.style.display="flex";
}

function closePOS(){
  posModal.style.display="none";
}

function changeQty(v){
  let q=parseInt(posQty.value)||0;
  q+=v;
  if(q<0) q=0;
  posQty.value=q;
  updateTotal();
}

function updateTotal(){
  let total=(posPrice.innerText * posQty.value)||0;
  posTotal.innerText=total.toFixed(2);
}

function addToReceipt(){
  let item={
    name:currentProduct.name,
    price:currentProduct.price,
    qty:parseInt(posQty.value),
    total:currentProduct.price * posQty.value
  };

  receipts.push(item);
  localStorage.setItem("receipts",JSON.stringify(receipts));

  beep();
  closePOS();
  alert("Added to receipt");
}
</script>

</body>
</html>
