<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Scanner Full</title>
<style>
body { margin:0; font-family:Arial; background:#f5f7fb; }
.topbar { position:sticky; top:0; background:#fff; z-index:1000; padding:5px; text-align:center; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
#scanner { width:100%; height:45vh; background:#000; display:none; }
button { padding:8px; margin:3px; border:none; border-radius:6px; font-size:0.85rem; }
#manualAddBtn { position:fixed; bottom:80px; right:15px; z-index:1000; font-size:22px; background:#4CAF50; color:white; border-radius:50%; width:55px; height:55px;}
#posControls { position:fixed; bottom:10px; left:50%; transform:translateX(-50%); z-index:1000; display:none;}
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;}
.modal-content { background:#fff; padding:20px; border-radius:10px; width:90%; max-width:400px; position:relative;}
.product-row { display:flex; justify-content:space-between; align-items:center; padding:6px; border-bottom:1px solid #ccc;}
.product-row div { display:flex; gap:5px; }
.small-btn { font-size:0.7rem; padding:3px 6px; color:white; border-radius:4px; }
.delete-btn { background:red; }
.edit-btn { background:blue; }
.qty-btn { padding:3px 6px; font-size:0.8rem;}
#cartSearchResults { max-height:100px; overflow-y:auto; margin-bottom:5px; }
#printReceiptDiv { position:absolute; left:-9999px;}
#manualAddModal input, #manualAddModal button { margin-bottom:5px; }
#scanBtn { position:absolute; right:5px; top:5px; width:35px; height:35px; font-size:16px; background:#2196F3; color:white; border:none; border-radius:6px;}
</style>
</head>
<body>

<div class="topbar">
  <button onclick="startScan('pos')">POS Scanner</button>
  <button onclick="openProducts()">Products</button>
  <button onclick="location.reload()">Refresh</button>
</div>

<div id="scanner"></div>

<button id="manualAddBtn" onclick="openAddModal()">➕</button>

<div id="posControls">
  <button onclick="openCart()">Cart</button>
</div>

<!-- ADD PRODUCT MODAL -->
<div id="manualAddModal" class="modal">
  <div class="modal-content">
    <h3>Add Product</h3>
    <div style="position:relative;">
      <input id="barcode" placeholder="Barcode (manual)">
      <button id="scanBtn">📷</button>
    </div>
    <input id="name" placeholder="Name">
    <input id="price" type="number" placeholder="Price">
    <input id="stock" type="number" placeholder="Stock">
    <div style="display:flex; justify-content:space-between;">
      <button id="saveBtn" onclick="saveProduct()" style="background:#4CAF50; color:white;">Save</button>
      <button onclick="clearFields()" style="background:#f0ad4e; color:white;">Clear</button>
      <button onclick="closeAdd()" style="background:#d9534f; color:white;">Close</button>
    </div>
  </div>
</div>

<!-- PRODUCTS MODAL -->
<div id="productsModal" class="modal">
  <div class="modal-content">
    <h3>Products</h3>
    <div id="productList"></div>
    <button onclick="closeProducts()">Close</button>
  </div>
</div>

<!-- CART MODAL -->
<div id="posCartModal" class="modal">
  <div class="modal-content">
    <h3>Cart</h3>
    <input id="cartSearchInput" placeholder="Search product..." oninput="filterCartSearch()">
    <div id="cartSearchResults"></div>
    <div id="cartItems"></div>
    <h3>Total: ₱<span id="cartTotal">0</span></h3>
    <button onclick="clearCart()">Clear</button>
    <button onclick="printReceipt()">Print</button>
    <button onclick="closeCart()">Close</button>
  </div>
</div>

<!-- RECEIPT -->
<div id="printReceiptDiv">
  <h2 style="text-align:center;">STORE RECEIPT</h2>
  <p id="receiptDate"></p>
  <table style="width:100%;">
    <tbody id="receiptBody"></tbody>
  </table>
  <h3>Total: ₱<span id="receiptTotal"></span></h3>
</div>

<audio id="beepAudio" src="beep.mp3.wav"></audio>
<script src="https://unpkg.com/html5-qrcode@2.3.7/minified/html5-qrcode.min.js"></script>
<script>
let products=JSON.parse(localStorage.getItem('products')||'[]');
let cart=[];
let scanner;
let lastScan=0;

/* Beep sound */
function beep(){ document.getElementById("beepAudio").play(); }

/* ------------------ SCANNER ------------------ */
function startScan(mode){
  document.getElementById("scanner").style.display="block";
  if(mode==="pos") document.getElementById("posControls").style.display="block";
  if(mode==="add") document.getElementById("manualAddModal").style.display="none";

  if(!scanner) scanner=new Html5Qrcode("scanner");
  else scanner.stop().catch(()=>{});

  scanner.start({facingMode:{exact:"environment"}},{fps:10,qrbox:250},
    code=>{
      let now=Date.now(); if(now-lastScan<2000) return; lastScan=now;
      beep();
      if(mode==="pos"){ addToCart(code); updateCartUI(); }
      else if(mode==="add"){ document.getElementById("barcode").value=code; closeScanner(); }
    },
    err=>{}
  ).catch(err=>{ alert("Camera unavailable, use manual input."); });
}

function closeScanner(){ 
  if(scanner) scanner.stop().catch(()=>{}); 
  document.getElementById("scanner").style.display="none"; 
  document.getElementById("manualAddModal").style.display="flex";
}

/* Camera button in Add Product */
document.getElementById("scanBtn").onclick=function(){ startScan("add"); };

/* ------------------ ADD PRODUCT ------------------ */
function openAddModal(){ document.getElementById("manualAddModal").style.display="flex"; }
function closeAdd(){ document.getElementById("manualAddModal").style.display="none"; }
function clearFields(){ document.getElementById("barcode").value=""; document.getElementById("name").value=""; document.getElementById("price").value=""; document.getElementById("stock").value=""; }

function saveProduct(){ 
    const barcode=document.getElementById("barcode").value.trim();
    const name=document.getElementById("name").value.trim();
    const price=parseFloat(document.getElementById("price").value)||0;
    const stock=parseInt(document.getElementById("stock").value)||0;
    if(!barcode||!name){ alert("Fill barcode and name"); return; }
    let existing=products.find(p=>p.barcode===barcode);
    if(existing){ alert("Product exists"); return; }
    products.push({barcode,name,price,stock});
    localStorage.setItem("products",JSON.stringify(products));
    clearFields(); closeAdd(); openProducts();
}

/* ------------------ PRODUCTS ------------------ */
function openProducts(){
  let list=document.getElementById("productList"); list.innerHTML="";
  let sorted=products.slice().sort((a,b)=>a.name.localeCompare(b.name));
  sorted.forEach(p=>{
    let div=document.createElement("div"); div.className="product-row";
    div.innerHTML=`<span>${p.name} ₱${p.price} [${p.stock}]</span>
    <div>
      <button class="small-btn edit-btn" onclick="editProduct('${p.barcode}')">Edit</button>
      <button class="small-btn delete-btn" onclick="deleteProduct('${p.barcode}')">Del</button>
    </div>`;
    list.appendChild(div);
  });
  document.getElementById("productsModal").style.display="flex";
}
function closeProducts(){ document.getElementById("productsModal").style.display="none"; }
function deleteProduct(barcode){ if(confirm("Delete product?")){ products=products.filter(p=>p.barcode!==barcode); localStorage.setItem("products",JSON.stringify(products)); openProducts(); } }
function editProduct(barcode){ let p=products.find(x=>x.barcode===barcode); if(!p) return; document.getElementById("barcode").value=p.barcode; document.getElementById("name").value=p.name; document.getElementById("price").value=p.price; document.getElementById("stock").value=p.stock; closeProducts(); openAddModal(); }

/* ------------------ CART ------------------ */
function openCart(){ document.getElementById("posCartModal").style.display="flex"; updateCartUI(); }
function closeCart(){ document.getElementById("posCartModal").style.display="none"; }

function addToCart(barcode){
  let p=products.find(x=>x.barcode===barcode);
  if(!p){ alert("Not found"); return; }
  if(p.stock<=0){ alert("Out of stock"); return; }
  let item=cart.find(i=>i.barcode===barcode);
  if(item){ item.qty++; item.total=item.qty*item.price; } 
  else cart.push({barcode:p.barcode,name:p.name,price:p.price,qty:1,total:p.price});
  p.stock--; localStorage.setItem("products",JSON.stringify(products)); updateCartUI();
}

function updateCartUI(){
  let c=document.getElementById("cartItems"); c.innerHTML=""; let total=0;
  cart.forEach((item,i)=>{ total+=item.total;
    let div=document.createElement("div"); div.className="product-row";
    div.innerHTML=`<span>${item.name}</span>
    <div>
      <button class="qty-btn" onclick="changeQty(${i},-1)">-</button>
      ${item.qty}
      <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
      ₱${item.total.toFixed(2)}
      <button class="small-btn delete-btn" onclick="removeItem(${i})">X</button>
    </div>`;
    c.appendChild(div);
  });
  document.getElementById("cartTotal").innerText=total.toFixed(2);
}

function changeQty(i,d){ let item=cart[i]; let p=products.find(x=>x.barcode===item.barcode); item.qty+=d; if(item.qty<0)item.qty=0; p.stock-=d; if(p.stock<0)p.stock=0; item.total=item.qty*item.price; localStorage.setItem("products",JSON.stringify(products)); updateCartUI(); }
function removeItem(i){ let item=cart[i]; let p=products.find(x=>x.barcode===item.barcode); p.stock+=item.qty; cart.splice(i,1); localStorage.setItem("products",JSON.stringify(products)); updateCartUI(); }
function clearCart(){ cart.forEach(item=>{ let p=products.find(x=>x.barcode===item.barcode); p.stock+=item.qty; }); cart=[]; localStorage.setItem("products",JSON.stringify(products)); updateCartUI(); }

function filterCartSearch(){ 
  let input=document.getElementById("cartSearchInput").value.toLowerCase(); 
  let resultsDiv=document.getElementById("cartSearchResults"); resultsDiv.innerHTML="";
  if(!input) return;
  let matches=products.filter(p=>p.name.toLowerCase().includes(input));
  matches.forEach(p=>{ 
    let div=document.createElement("div"); div.style.padding="3px"; div.style.borderBottom="1px solid #ccc"; div.style.cursor="pointer";
    div.textContent=`${p.name} ₱${p.price} [${p.stock}]`;
    div.onclick=function(){ addToCart(p.barcode); document.getElementById("cartSearchInput").value=""; resultsDiv.innerHTML=""; };
    resultsDiv.appendChild(div);
  });
}

/* ------------------ PRINT ------------------ */
function printReceipt(){ 
  if(cart.length===0){ alert("Empty"); return; } 
  let body=document.getElementById("receiptBody"); body.innerHTML=""; 
  let total=0;
  cart.forEach(item=>{ total+=item.total; let tr=document.createElement("tr"); tr.innerHTML=`<td>${item.name}</td><td>${item.qty}</td><td>₱${item.total.toFixed(2)}</td>`; body.appendChild(tr); });
  document.getElementById("receiptTotal").innerText=total.toFixed(2);
  document.getElementById("receiptDate").innerText=new Date().toLocaleString();
  window.print();
}
</script>
</body>
</html>
