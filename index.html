<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Scanner</title>

<style>
body { margin:0; font-family:Arial; background:#f5f7fb; }
#scanner { width:100%; height:45vh; background:#000; }

button { padding:10px; margin:5px; border:none; border-radius:6px; font-size:1rem; cursor:pointer; }

.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%;
background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }

.modal-content { background:#fff; padding:20px; border-radius:10px; width:90%; max-width:400px; }

.product-row {
  border-bottom:1px solid #ccc;
  padding:6px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:0.95rem;
}

.small-btn {
  font-size:0.7rem;
  padding:3px 6px;
  margin-left:5px;
  background:red;
  color:white;
}

.qty-btn {
  padding:3px 8px;
  font-size:0.8rem;
}

#posControls {
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  z-index:999;
  display:none;
}

/* PRINT ONLY RECEIPT */
#printReceiptDiv { position:absolute; left:-9999px; }

@media print {
  body * { visibility:hidden; }
  #printReceiptDiv, #printReceiptDiv * { visibility:visible; }
  #printReceiptDiv { position:absolute; top:0; left:0; width:100%; }
}
</style>
</head>

<body>

<div id="scanner"></div>

<div id="posControls">
  <button onclick="openCart()">Cart</button>
</div>

<div style="text-align:center;">
  <button onclick="startScan('search')">Search</button>
  <button onclick="startScan('pos')">POS</button>
  <button onclick="openProducts()">Products</button>
</div>

<!-- PRODUCTS -->
<div id="productsModal" class="modal">
<div class="modal-content">
<h3>Products</h3>
<div id="productList"></div>
<button onclick="closeProducts()">Close</button>
</div>
</div>

<!-- CART -->
<div id="posCartModal" class="modal">
<div class="modal-content">
<h3>Cart</h3>
<div id="cartItems"></div>
<h3>Total: ₱<span id="cartTotal">0</span></h3>
<button onclick="clearCart()">Clear</button>
<button onclick="printReceipt()">Print</button>
<button onclick="closeCart()">Close</button>
</div>
</div>

<!-- RECEIPT -->
<div id="printReceiptDiv">
<h2 style="text-align:center;">STORE RECEIPT</h2>
<p id="receiptDate"></p>
<table style="width:100%;">
<tbody id="receiptBody"></tbody>
</table>
<h3>Total: ₱<span id="receiptTotal"></span></h3>
</div>

<audio id="beepAudio" src="beep.mp3.wav"></audio>
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
let products = JSON.parse(localStorage.getItem('products')||'[]');
let cart = [];
let scanner;
let mode="";
let lastScanTime=0;

function beep(){ document.getElementById("beepAudio").play(); }

// SCAN
function startScan(m){
  mode=m;
  document.getElementById("posControls").style.display = (m==="pos")?"block":"none";

  if(!scanner) scanner = new Html5Qrcode("scanner");

  Html5Qrcode.getCameras().then(()=>{
    scanner.start({facingMode:"environment"},{fps:10,qrbox:250},
      code=>{
        beep();

        if(mode==="pos") handlePOSScan(code);
        if(mode==="search"){
          let p=products.find(x=>x.barcode===code);
          alert(p?`${p.name} ₱${p.price}`:"Not found");
          scanner.stop();
        }
      }
    );
  });
}

// POS SCAN
function handlePOSScan(code){
  let now=Date.now();
  if(now-lastScanTime<2000) return;
  lastScanTime=now;

  let p=products.find(x=>x.barcode===code);
  if(!p){ alert("Not found"); return; }
  if(p.stock<=0){ alert("Out of stock"); return; }

  let e=cart.find(i=>i.barcode===code);

  if(e){
    e.qty++;
    e.total=e.qty*e.price;
  } else {
    cart.push({barcode:p.barcode,name:p.name,price:p.price,qty:1,total:p.price});
  }

  p.stock--;
  saveProducts();
  updateCartUI();
}

// CART UI
function updateCartUI(){
  let c=document.getElementById("cartItems");
  c.innerHTML="";
  let total=0;

  cart.forEach((item,i)=>{
    total+=item.total;

    let div=document.createElement("div");
    div.className="product-row";

    div.innerHTML=`
      <span>${item.name}</span>
      <div>
        <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
        ${item.qty}
        <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
        ₱${item.total.toFixed(2)}
        <button class="small-btn" onclick="removeItem(${i})">❌</button>
      </div>
    `;
    c.appendChild(div);
  });

  document.getElementById("cartTotal").innerText=total.toFixed(2);
}

// CHANGE QTY
function changeQty(i,delta){
  let item=cart[i];
  let p=products.find(x=>x.barcode===item.barcode);

  item.qty+=delta;
  if(item.qty<0)item.qty=0;

  p.stock-=delta;
  if(p.stock<0)p.stock=0;

  item.total=item.qty*item.price;
  saveProducts();
  updateCartUI();
}

// REMOVE ITEM (UNDO)
function removeItem(i){
  let item=cart[i];
  let p=products.find(x=>x.barcode===item.barcode);

  p.stock+=item.qty; // restore stock
  cart.splice(i,1);

  saveProducts();
  updateCartUI();
}

// CLEAR CART
function clearCart(){
  cart.forEach(item=>{
    let p=products.find(x=>x.barcode===item.barcode);
    p.stock+=item.qty;
  });
  cart=[];
  saveProducts();
  updateCartUI();
}

// PRODUCTS LIST
function openProducts(){
  let list=document.getElementById("productList");
  list.innerHTML="";

  products.forEach((p,i)=>{
    let div=document.createElement("div");
    div.className="product-row";
    div.style.color=(p.stock<=0)?"red":"black";

    div.innerHTML=`
      <span>${p.name} (₱${p.price}) [${p.stock}]</span>
      <button class="small-btn" onclick="deleteProduct(${i})">Del</button>
    `;

    list.appendChild(div);
  });

  document.getElementById("productsModal").style.display="flex";
}

function deleteProduct(i){
  if(confirm("Delete product?")){
    products.splice(i,1);
    saveProducts();
    openProducts();
  }
}

function closeProducts(){
  document.getElementById("productsModal").style.display="none";
}

// SAVE
function saveProducts(){
  localStorage.setItem("products",JSON.stringify(products));
}

// CART MODAL
function openCart(){ document.getElementById("posCartModal").style.display="flex"; }
function closeCart(){ document.getElementById("posCartModal").style.display="none"; }

// PRINT
function printReceipt(){
  if(cart.length===0){ alert("Cart empty"); return; }

  let body=document.getElementById("receiptBody");
  body.innerHTML="";
  let total=0;

  cart.forEach(item=>{
    total+=item.total;
    let tr=document.createElement("tr");
    tr.innerHTML=`<td>${item.name}</td><td>${item.qty}</td><td>₱${item.total.toFixed(2)}</td>`;
    body.appendChild(tr);
  });

  document.getElementById("receiptTotal").innerText=total.toFixed(2);
  document.getElementById("receiptDate").innerText=new Date().toLocaleString();

  window.print();
}
</script>

</body>
</html>
