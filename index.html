<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Scanner</title>

<style>
body { margin:0; font-family:Arial; background:#f5f7fb; }

.topbar {
  position:sticky;
  top:0;
  background:#fff;
  z-index:1000;
  padding:5px;
  text-align:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

#scanner { width:100%; height:45vh; background:#000; }

button { padding:8px; margin:3px; border:none; border-radius:6px; font-size:0.8rem; }

#manualAddBtn {
  position:fixed;
  bottom:80px;
  right:15px;
  z-index:1000;
  font-size:22px;
  background:#4CAF50;
  color:white;
  border-radius:50%;
  width:55px;
  height:55px;
}

#posControls {
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  z-index:1000;
  display:none;
}

.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
}

.product-row {
  display:flex;
  justify-content:space-between;
  padding:6px;
  border-bottom:1px solid #ccc;
}

.small-btn {
  font-size:0.7rem;
  padding:3px 6px;
  background:red;
  color:white;
}

#printReceiptDiv { position:absolute; left:-9999px; }

@media print {
  body * { visibility:hidden; }
  #printReceiptDiv, #printReceiptDiv * { visibility:visible; }
  #printReceiptDiv { position:absolute; top:0; left:0; width:100%; }
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="startScan('search')">Search</button>
  <button onclick="startScan('pos')">POS</button>
  <button onclick="openProducts()">Products</button>
  <button onclick="location.reload()">Refresh</button>
</div>

<div id="scanner"></div>

<button id="manualAddBtn" onclick="openAddModal()">➕</button>

<div id="posControls">
  <button onclick="openCart()">Cart</button>
</div>

<!-- ADD PRODUCT -->
<div id="manualAddModal" class="modal">
<div class="modal-content">
<h3>Add / Edit Product</h3>

<div style="position:relative;">
  <input id="barcode" placeholder="Barcode">
  <button id="scanBtn" style="position:absolute; right:5px; top:5px;">📷</button>
</div>

<input id="name" placeholder="Name">
<input id="price" type="number" placeholder="Price">
<input id="stock" type="number" placeholder="Stock">

<button onclick="saveProduct()">Save</button>
<button onclick="clearFields()">Clear</button>
<button onclick="closeAdd()">Close</button>
</div>
</div>

<!-- PRODUCTS -->
<div id="productsModal" class="modal">
<div class="modal-content">
<h3>Products</h3>

<input id="searchInput" placeholder="Search name or barcode..." 
oninput="filterProducts()" 
style="width:100%; padding:8px; margin-bottom:10px;">

<div id="productList"></div>

<button onclick="closeProducts()">Close</button>
</div>
</div>

<!-- CART -->
<div id="posCartModal" class="modal">
<div class="modal-content">
<h3>Cart</h3>
<div id="cartItems"></div>
<h3>Total: ₱<span id="cartTotal">0</span></h3>
<button onclick="clearCart()">Clear</button>
<button onclick="printReceipt()">Print</button>
<button onclick="closeCart()">Close</button>
</div>
</div>

<!-- RECEIPT -->
<div id="printReceiptDiv">
<h2 style="text-align:center;">STORE RECEIPT</h2>
<p id="receiptDate"></p>
<table style="width:100%;">
<tbody id="receiptBody"></tbody>
</table>
<h3>Total: ₱<span id="receiptTotal"></span></h3>
</div>

<audio id="beepAudio" src="beep.mp3.wav"></audio>
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
let products = JSON.parse(localStorage.getItem('products')||'[]');
let cart = [];
let scanner;
let mode="";
let lastScanTime=0;
let editingBarcode=null;

/* SOUND */
function beep(){ document.getElementById("beepAudio").play(); }

/* SCAN */
function startScan(m){
  mode=m;
  document.getElementById("posControls").style.display = (m==="pos")?"block":"none";

  if(!scanner) scanner = new Html5Qrcode("scanner");

  Html5Qrcode.getCameras().then(()=>{
    scanner.start({facingMode:"environment"},{fps:10,qrbox:250},
      code=>{
        beep();

        if(mode==="add"){
          barcode.value = code;
          manualAddModal.style.display="flex";
          scanner.stop();
        }

        if(mode==="pos") handlePOSScan(code);

        if(mode==="search"){
          let p=products.find(x=>x.barcode===code);
          alert(p?`${p.name} ₱${p.price}`:"Not found");
          scanner.stop();
        }
      }
    );
  });
}

scanBtn.onclick=()=>{
  manualAddModal.style.display="none";
  startScan("add");
};

/* SAVE PRODUCT */
function saveProduct(){
  let newProduct={
    barcode:barcode.value,
    name:name.value,
    price:parseFloat(price.value)||0,
    stock:parseInt(stock.value)||0
  };

  if(editingBarcode){
    let index=products.findIndex(p=>p.barcode===editingBarcode);
    products[index]=newProduct;
    editingBarcode=null;
  } else {
    products.push(newProduct);
  }

  saveProducts();
  closeAdd();
}

/* EDIT */
function editProduct(code){
  let p=products.find(x=>x.barcode===code);
  if(!p) return;

  barcode.value=p.barcode;
  name.value=p.name;
  price.value=p.price;
  stock.value=p.stock;

  editingBarcode=code;
  closeProducts();
  openAddModal();
}

/* DELETE */
function deleteProduct(code){
  if(confirm("Delete product?")){
    products=products.filter(p=>p.barcode!==code);
    saveProducts();
    openProducts();
  }
}

/* PRODUCTS + SEARCH */
function openProducts(){
  searchInput.value="";
  renderProductList(products);
  productsModal.style.display="flex";
}

function filterProducts(){
  let keyword=searchInput.value.toLowerCase();

  let filtered=products.filter(p =>
    (p.name && p.name.toLowerCase().includes(keyword)) ||
    (p.barcode && p.barcode.toLowerCase().includes(keyword))
  );

  renderProductList(filtered);
}

function renderProductList(list){
  let container=document.getElementById("productList");
  container.innerHTML="";

  list.forEach(p=>{
    let div=document.createElement("div");
    div.className="product-row";
    div.style.color=(p.stock<=0)?"red":"black";

    div.innerHTML=`
      <span>
        ${p.name}<br>
        <small>${p.barcode}</small><br>
        ₱${p.price} | Stock: ${p.stock}
      </span>

      <div>
        <button onclick="editProduct('${p.barcode}')">Edit</button>
        <button class="small-btn" onclick="deleteProduct('${p.barcode}')">Del</button>
      </div>
    `;

    container.appendChild(div);
  });
}

function closeProducts(){ productsModal.style.display="none"; }

/* STORAGE */
function saveProducts(){
  localStorage.setItem("products",JSON.stringify(products));
}

/* ADD MODAL */
function openAddModal(){ manualAddModal.style.display="flex"; }
function closeAdd(){ manualAddModal.style.display="none"; }

function clearFields(){
  barcode.value=""; name.value=""; price.value=""; stock.value="";
}

/* POS (unchanged) */
function handlePOSScan(code){
  let now=Date.now();
  if(now-lastScanTime<2000) return;
  lastScanTime=now;

  let p=products.find(x=>x.barcode===code);
  if(!p || p.stock<=0){ alert("Invalid / out of stock"); return; }

  let e=cart.find(i=>i.barcode===code);
  if(e){ e.qty++; e.total=e.qty*e.price; }
  else cart.push({barcode:p.barcode,name:p.name,price:p.price,qty:1,total:p.price});

  p.stock--;
  saveProducts();
  updateCartUI();
}

function updateCartUI(){
  let c=document.getElementById("cartItems");
  c.innerHTML="";
  let total=0;

  cart.forEach((item,i)=>{
    total+=item.total;

    let div=document.createElement("div");
    div.className="product-row";

    div.innerHTML=`
      <span>${item.name}</span>
      <div>
        <button onclick="changeQty(${i},-1)">-</button>
        ${item.qty}
        <button onclick="changeQty(${i},1)">+</button>
        ₱${item.total.toFixed(2)}
        <button class="small-btn" onclick="removeItem(${i})">X</button>
      </div>
    `;

    c.appendChild(div);
  });

  cartTotal.innerText=total.toFixed(2);
}

function changeQty(i,d){
  let item=cart[i];
  let p=products.find(x=>x.barcode===item.barcode);

  item.qty+=d;
  if(item.qty<0)item.qty=0;

  p.stock-=d;
  item.total=item.qty*item.price;

  saveProducts();
  updateCartUI();
}

function removeItem(i){
  let item=cart[i];
  let p=products.find(x=>x.barcode===item.barcode);
  p.stock+=item.qty;
  cart.splice(i,1);
  saveProducts();
  updateCartUI();
}

function clearCart(){
  cart.forEach(item=>{
    let p=products.find(x=>x.barcode===item.barcode);
    p.stock+=item.qty;
  });
  cart=[];
  saveProducts();
  updateCartUI();
}

function openCart(){ posCartModal.style.display="flex"; }
function closeCart(){ posCartModal.style.display="none"; }

/* PRINT */
function printReceipt(){
  if(cart.length===0){ alert("Empty"); return; }

  let body=document.getElementById("receiptBody");
  body.innerHTML="";
  let total=0;

  cart.forEach(item=>{
    total+=item.total;
    let tr=document.createElement("tr");
    tr.innerHTML=`<td>${item.name}</td><td>${item.qty}</td><td>₱${item.total.toFixed(2)}</td>`;
    body.appendChild(tr);
  });

  receiptTotal.innerText=total.toFixed(2);
  receiptDate.innerText=new Date().toLocaleString();

  window.print();
}
</script>

</body>
</html>
