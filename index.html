<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Scanner</title>

<style>
body { margin:0; font-family:Arial; background:#f5f7fb; }

/* TOP BAR */
.topbar {
  position:sticky;
  top:0;
  background:#fff;
  z-index:1000;
  padding:5px;
  text-align:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

#scanner { width:100%; height:45vh; background:#000; }

button {
  padding:8px;
  margin:3px;
  border:none;
  border-radius:6px;
  font-size:0.85rem;
}

/* FLOAT ADD */
#manualAddBtn {
  position:fixed;
  bottom:80px;
  right:15px;
  z-index:1000;
  font-size:22px;
  background:#4CAF50;
  color:white;
  border-radius:50%;
  width:55px;
  height:55px;
}

/* CART BUTTON */
#posControls {
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  z-index:1000;
  display:none;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
}

/* PRODUCT */
.product-row {
  display:flex;
  justify-content:space-between;
  padding:6px;
  border-bottom:1px solid #ccc;
  align-items:center;
}

.small-btn {
  font-size:0.7rem;
  padding:3px 6px;
  background:red;
  color:white;
}

.qty-btn {
  padding:3px 6px;
  font-size:0.8rem;
}

/* PRINT */
#printReceiptDiv { position:absolute; left:-9999px; }

@media print {
  body * { visibility:hidden; }
  #printReceiptDiv, #printReceiptDiv * { visibility:visible; }
  #printReceiptDiv { position:absolute; top:0; left:0; width:100%; }
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <button onclick="startScan('search')">Search</button>
  <button onclick="startScan('pos')">POS</button>
  <button onclick="openProducts()">Products</button>
  <button onclick="location.reload()">Refresh</button>
</div>

<!-- SCANNER -->
<div id="scanner"></div>

<!-- ADD BUTTON -->
<button id="manualAddBtn" onclick="openAddModal()">➕</button>

<!-- CART BUTTON -->
<div id="posControls">
  <button onclick="openCart()">Cart</button>
</div>

<!-- ADD PRODUCT -->
<div id="manualAddModal" class="modal">
<div class="modal-content">
<h3>Add Product</h3>

<div style="position:relative;">
  <input id="barcode" placeholder="Barcode">
  <button id="scanBtn" style="position:absolute; right:5px; top:5px;">📷</button>
</div>

<input id="name" placeholder="Name">
<input id="price" type="number" placeholder="Price">
<input id="stock" type="number" placeholder="Stock">

<button onclick="saveProduct()">Save</button>
<button onclick="clearFields()">Clear</button>
<button onclick="closeAdd()">Close</button>
</div>
</div>

<!-- PRODUCTS -->
<div id="productsModal" class="modal">
<div class="modal-content">
<h3>Products</h3>
<div id="productList"></div>
<button onclick="closeProducts()">Close</button>
</div>
</div>

<!-- CART -->
<div id="posCartModal" class="modal">
<div class="modal-content">
<h3>Cart</h3>
<div id="cartItems"></div>
<h3>Total: ₱<span id="cartTotal">0</span></h3>
<button onclick="clearCart()">Clear</button>
<button onclick="printReceipt()">Print</button>
<button onclick="closeCart()">Close</button>
</div>
</div>

<!-- RECEIPT -->
<div id="printReceiptDiv">
<h2 style="text-align:center;">STORE RECEIPT</h2>
<p id="receiptDate"></p>
<table style="width:100%;">
<tbody id="receiptBody"></tbody>
</table>
<h3>Total: ₱<span id="receiptTotal"></span></h3>
</div>

<audio id="beepAudio" src="beep.mp3.wav"></audio>
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
let products = JSON.parse(localStorage.getItem('products')||'[]');
let cart = [];
let scanner;
let mode="";
let lastScanTime=0;

/* SOUND */
function beep(){ document.getElementById("beepAudio").play(); }

/* SCAN */
function startScan(m){
  mode=m;
  document.getElementById("posControls").style.display = (m==="pos")?"block":"none";

  if(!scanner) scanner = new Html5Qrcode("scanner");

  Html5Qrcode.getCameras().then(()=>{
    scanner.start({facingMode:"environment"},{fps:10,qrbox:250},
      code=>{
        beep();

        if(mode==="add"){
          document.getElementById("barcode").value = code;
          document.getElementById("manualAddModal").style.display="flex";
          scanner.stop();
        }

        if(mode==="pos") handlePOSScan(code);

        if(mode==="search"){
          let p=products.find(x=>x.barcode===code);
          alert(p?`${p.name} ₱${p.price}`:"Not found");
          scanner.stop();
        }
      }
    );
  });
}

/* CAMERA BUTTON */
document.getElementById("scanBtn").onclick = function(){
  document.getElementById("manualAddModal").style.display="none";
  startScan("add");
};

/* POS */
function handlePOSScan(code){
  let now=Date.now();
  if(now-lastScanTime<2000) return;
  lastScanTime=now;

  let p=products.find(x=>x.barcode===code);
  if(!p){ alert("Not found"); return; }
  if(p.stock<=0){ alert("Out of stock"); return; }

  let e=cart.find(i=>i.barcode===code);

  if(e){ e.qty++; e.total=e.qty*e.price; }
  else cart.push({barcode:p.barcode,name:p.name,price:p.price,qty:1,total:p.price});

  p.stock--;
  saveProducts();
  updateCartUI();
}

/* CART */
function updateCartUI(){
  let c=document.getElementById("cartItems");
  c.innerHTML="";
  let total=0;

  cart.forEach((item,i)=>{
    total+=item.total;

    let div=document.createElement("div");
    div.className="product-row";

    div.innerHTML=`
      <span>${item.name}</span>
      <div>
        <button class="qty-btn" onclick="changeQty(${i},-1)">-</button>
        ${item.qty}
        <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
        ₱${item.total.toFixed(2)}
        <button class="small-btn" onclick="removeItem(${i})">X</button>
      </div>
    `;
    c.appendChild(div);
  });

  document.getElementById("cartTotal").innerText=total.toFixed(2);
}

function changeQty(i,d){
  let item=cart[i];
  let p=products.find(x=>x.barcode===item.barcode);

  item.qty+=d;
  if(item.qty<0)item.qty=0;

  p.stock-=d;
  if(p.stock<0)p.stock=0;

  item.total=item.qty*item.price;
  saveProducts();
  updateCartUI();
}

function removeItem(i){
  let item=cart[i];
  let p=products.find(x=>x.barcode===item.barcode);
  p.stock+=item.qty;
  cart.splice(i,1);
  saveProducts();
  updateCartUI();
}

function clearCart(){
  cart.forEach(item=>{
    let p=products.find(x=>x.barcode===item.barcode);
    p.stock+=item.qty;
  });
  cart=[];
  saveProducts();
  updateCartUI();
}

/* PRODUCTS */
function openProducts(){
  let list=document.getElementById("productList");
  list.innerHTML="";

  products.forEach((p,i)=>{
    let div=document.createElement("div");
    div.className="product-row";
    div.style.color=(p.stock<=0)?"red":"black";

    div.innerHTML=`
      <span>${p.name} ₱${p.price} [${p.stock}]</span>
      <button class="small-btn" onclick="deleteProduct(${i})">Del</button>
    `;
    list.appendChild(div);
  });

  document.getElementById("productsModal").style.display="flex";
}

function deleteProduct(i){
  if(confirm("Delete product?")){
    products.splice(i,1);
    saveProducts();
    openProducts();
  }
}

function closeProducts(){
  document.getElementById("productsModal").style.display="none";
}

/* ADD PRODUCT */
function openAddModal(){ document.getElementById("manualAddModal").style.display="flex"; }
function closeAdd(){ document.getElementById("manualAddModal").style.display="none"; }

function clearFields(){
  barcode.value=""; name.value=""; price.value=""; stock.value="";
}

function saveProduct(){
  products.push({
    barcode:barcode.value,
    name:name.value,
    price:parseFloat(price.value)||0,
    stock:parseInt(stock.value)||0
  });
  saveProducts();
  closeAdd();
}

/* STORAGE */
function saveProducts(){
  localStorage.setItem("products",JSON.stringify(products));
}

/* CART MODAL */
function openCart(){ document.getElementById("posCartModal").style.display="flex"; }
function closeCart(){ document.getElementById("posCartModal").style.display="none"; }

/* PRINT */
function printReceipt(){
  if(cart.length===0){ alert("Empty"); return; }

  let body=document.getElementById("receiptBody");
  body.innerHTML="";
  let total=0;

  cart.forEach(item=>{
    total+=item.total;
    let tr=document.createElement("tr");
    tr.innerHTML=`<td>${item.name}</td><td>${item.qty}</td><td>₱${item.total.toFixed(2)}</td>`;
    body.appendChild(tr);
  });

  receiptTotal.innerText=total.toFixed(2);
  receiptDate.innerText=new Date().toLocaleString();

  window.print();
}
</script>

</body>
</html>
